version: '3.8'

services:

  postgres:docker logs job_intelligent_airflow | findstr "password"
    image: postgres:15
    container_name: job_intelligent_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: job_intelligent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: job_intelligent_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jobintelligent.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  airflow:
    image: apache/airflow:2.9.0
    container_name: job_intelligent_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres/job_intelligent
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    ports:
      - "8080:8080"
    volumes:
      - ./src/etl:/opt/airflow/dags
    depends_on:
      - postgres
    command: standalone

volumes:
  postgres_data: